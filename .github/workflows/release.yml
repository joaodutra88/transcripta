name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      # Build Electron app + create installer
      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload installer artifact
      - uses: actions/upload-artifact@v4
        with:
          name: transcripta-installer
          path: |
            dist/*.exe
            dist/*.yml
          retention-days: 30

      # Publish to GitHub Releases (electron-builder handles this via publish config)
      - run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
