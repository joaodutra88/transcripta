appId: com.joaodutra88.transcripta
productName: Transcripta
copyright: Copyright © 2026 joaodutra88

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: python/
    to: python
    filter:
      - '**/*'
      - '!**/__pycache__/**'
      - '!**/*.pyc'
      - '!**/.venv/**'

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico

publish:
  provider: github
  owner: joaodutra88
  repo: transcripta
  releaseType: draft
